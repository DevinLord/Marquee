<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Marquee</title>
<meta name="description" content="A personal, single-user movie diary powered by TMDB." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Karla:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #10151f; }
  #root { min-height: 100vh; }
  #boot-message {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    color: #9aa0ae; font-family: Georgia, serif; letter-spacing: .08em; font-size: 14px;
  }
</style>
</head>
<body>
<div id="root"><div id="boot-message">Raising the curtain…</div></div>

<!-- React, ReactDOM, and Babel standalone (in-browser JSX compiler) —
     this lets the app run as a single plain HTML file with no build step.
     Requires an internet connection to load these scripts. -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js" crossorigin></script>

<!-- Supabase client — only used if you connect cloud sync in Settings.
     Harmless if you never set it up; the app works local-only otherwise. -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ------------------------------------------------------------------
   MARQUEE — a personal movie diary
   Design direction: "the movie palace after the house lights dim."
   Deep velvet-blue night, ticket-paper cream, tarnished brass, and a
   muted curtain crimson. Display type set like a title card
   (Marcellus, letterspaced caps); body in Karla. Signature element:
   diary entries rendered as ticket stubs with a perforated edge, and
   the Top 5 set on a brass-numbered marquee.
------------------------------------------------------------------- */

const IMG = "https://image.tmdb.org/t/p/";
const STORE = {
  settings: "moviediary-settings",
  entries: "moviediary-entries",
  lists: "moviediary-lists",
  top5: "moviediary-top5",
};

/* ---------------- storage helpers ----------------
   Standalone build: persists to this browser's localStorage instead of
   the Claude-artifact window.storage API, so the app can be opened as a
   plain HTML file or hosted (e.g. on Netlify) outside claude.ai. Same
   async signature as before so nothing else in the app had to change. */

async function loadKey(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    if (raw !== null) return JSON.parse(raw);
  } catch (e) {
    /* key doesn't exist yet, or storage is unavailable — that's fine */
  }
  return fallback;
}

async function saveKey(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
    return true;
  } catch (e) {
    console.error("Save failed:", e);
    return false;
  }
}

/* ---------------- cloud sync (optional) ----------------
   If a Supabase project is connected, diary data (entries, lists, top5)
   also lives in one small Postgres table, so it's the same on every
   device. Local `localStorage` always stays as a fast, offline-safe
   cache — cloud calls are additive and fail silently to local-only if
   the network is down or nothing's configured yet. TMDB key and the
   Supabase credentials themselves are per-device only; they're what
   you use to reach the shared data, so they aren't part of it. */

const SYNC_TABLE = "kv_store";
let _syncClient = null;

function getSyncClient(url, key) {
  if (!url || !key || !window.supabase) return null;
  if (!_syncClient || _syncClient.__url !== url || _syncClient.__key !== key) {
    try {
      _syncClient = window.supabase.createClient(url, key);
      _syncClient.__url = url;
      _syncClient.__key = key;
    } catch (e) {
      return null;
    }
  }
  return _syncClient;
}

async function syncPullAll(url, key) {
  const client = getSyncClient(url, key);
  if (!client) return null;
  try {
    const { data, error } = await client.from(SYNC_TABLE).select("key, value");
    if (error) throw error;
    const out = {};
    (data || []).forEach((row) => { out[row.key] = row.value; });
    return out;
  } catch (e) {
    return null;
  }
}

async function syncPush(url, key, storeKey, value) {
  const client = getSyncClient(url, key);
  if (!client) return false;
  try {
    const { error } = await client
      .from(SYNC_TABLE)
      .upsert({ key: storeKey, value, updated_at: new Date().toISOString() }, { onConflict: "key" });
    if (error) throw error;
    return true;
  } catch (e) {
    return false;
  }
}

async function syncTest(url, key) {
  const client = getSyncClient(url, key);
  if (!client) return "Enter both fields first.";
  try {
    const { error } = await client.from(SYNC_TABLE).select("key").limit(1);
    if (error) throw error;
    return null; // no error = success
  } catch (e) {
    return "Couldn't reach that Supabase project. Check the URL/key, and make sure the kv_store table exists (see README).";
  }
}

/* ---------------- TMDB helpers ---------------- */

function buildTmdb(apiKey) {
  return async function tmdb(path, params = {}) {
    if (!apiKey) throw new Error("NO_KEY");
    const isBearer = apiKey.startsWith("eyJ"); // v4 read access token
    const url = new URL("https://api.themoviedb.org/3" + path);
    Object.entries(params).forEach(([k, v]) => {
      if (v !== undefined && v !== null && v !== "") url.searchParams.set(k, v);
    });
    if (!isBearer) url.searchParams.set("api_key", apiKey);
    let res;
    try {
      res = await fetch(url.toString(), {
        headers: isBearer ? { Authorization: "Bearer " + apiKey } : {},
      });
    } catch (e) {
      throw new Error("NETWORK");
    }
    if (res.status === 401) throw new Error("BAD_KEY");
    if (res.status === 429) throw new Error("RATE_LIMIT");
    if (!res.ok) throw new Error("HTTP_" + res.status);
    return res.json();
  };
}

function friendlyError(err) {
  switch (err.message) {
    case "NO_KEY":
      return "Add your TMDB API key in Settings to search for movies.";
    case "BAD_KEY":
      return "TMDB rejected that API key. Check it in Settings.";
    case "RATE_LIMIT":
      return "TMDB is asking us to slow down. Wait a few seconds and try again.";
    case "NETWORK":
      return "Couldn't reach TMDB. Check your connection and try again.";
    default:
      return "Something went wrong talking to TMDB. Try again in a moment.";
  }
}

/* ---------------- small utilities ---------------- */

function fmtDate(iso) {
  if (!iso) return "—";
  const [y, m, d] = iso.split("-").map(Number);
  const dt = new Date(y, m - 1, d);
  return dt.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
}

function todayISO() {
  const d = new Date();
  const p = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
}

function yearOf(entry) {
  return entry.releaseDate ? entry.releaseDate.slice(0, 4) : "";
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

/* ---------------- stars ---------------- */

function StarDisplay({ value, size = 15 }) {
  return (
    <span className="stars" aria-label={`${value} out of 5 stars`} style={{ fontSize: size }}>
      {[0, 1, 2, 3, 4].map((i) => {
        const fill = Math.max(0, Math.min(1, value - i));
        return (
          <span className="star-wrap" key={i} aria-hidden="true">
            <span className="star-empty">★</span>
            <span className="star-fill" style={{ width: fill * 100 + "%" }}>★</span>
          </span>
        );
      })}
    </span>
  );
}

function StarInput({ value, onChange, size = 26 }) {
  const [hover, setHover] = useState(null);
  const shown = hover != null ? hover : value;

  const handleKey = (e) => {
    if (e.key === "ArrowRight" || e.key === "ArrowUp") {
      e.preventDefault();
      onChange(Math.min(5, (value || 0) + 0.5));
    } else if (e.key === "ArrowLeft" || e.key === "ArrowDown") {
      e.preventDefault();
      onChange(Math.max(0.5, (value || 0.5) - 0.5));
    }
  };

  return (
    <div
      className="star-input"
      role="slider"
      tabIndex={0}
      aria-label="Rating"
      aria-valuemin={0.5}
      aria-valuemax={5}
      aria-valuenow={value || 0}
      aria-valuetext={`${value || 0} stars`}
      onKeyDown={handleKey}
      onMouseLeave={() => setHover(null)}
      style={{ fontSize: size }}
    >
      {[0, 1, 2, 3, 4].map((i) => {
        const fill = Math.max(0, Math.min(1, shown - i));
        return (
          <span className="star-wrap star-hit" key={i}>
            <span className="star-empty" aria-hidden="true">★</span>
            <span className="star-fill" aria-hidden="true" style={{ width: fill * 100 + "%" }}>★</span>
            <button
              type="button"
              className="half-hit left"
              tabIndex={-1}
              aria-label={`${i + 0.5} stars`}
              onMouseEnter={() => setHover(i + 0.5)}
              onClick={() => onChange(i + 0.5)}
            />
            <button
              type="button"
              className="half-hit right"
              tabIndex={-1}
              aria-label={`${i + 1} stars`}
              onMouseEnter={() => setHover(i + 1)}
              onClick={() => onChange(i + 1)}
            />
          </span>
        );
      })}
      <span className="star-num">{shown ? shown.toFixed(1) : "—"}</span>
    </div>
  );
}

/* ---------------- ticket stub card ---------------- */

function TicketCard({ entry, onOpen }) {
  const poster = entry.chosenPoster || entry.posterPath;
  return (
    <button className="ticket" onClick={onOpen} aria-label={`Open ${entry.title}`}>
      <div className="ticket-poster">
        {poster ? (
          <img src={IMG + "w342" + poster} alt="" loading="lazy" />
        ) : (
          <div className="poster-blank"><span>{entry.title}</span></div>
        )}
      </div>
      <div className="ticket-perf" aria-hidden="true" />
      <div className="ticket-stub">
        <div className="ticket-title">{entry.title}</div>
        <div className="ticket-meta">
          <StarDisplay value={entry.rating} size={12} />
          <span className="ticket-date">{fmtDate(entry.watchedDate)}</span>
        </div>
      </div>
    </button>
  );
}

/* ---------------- main app ---------------- */

function MovieDiary() {
  const [loaded, setLoaded] = useState(false);
  const [apiKey, setApiKey] = useState("");
  const [syncUrl, setSyncUrl] = useState("");
  const [syncKey, setSyncKey] = useState("");
  const [syncStatus, setSyncStatus] = useState("off"); // 'off' | 'synced' | 'offline'
  const [entries, setEntries] = useState({}); // tmdbId -> entry
  const [lists, setLists] = useState([]); // {id, name, movieIds:[]}
  const [top5, setTop5] = useState([null, null, null, null, null]);
  const [view, setView] = useState({ name: "diary" });
  const [logOpen, setLogOpen] = useState(false);
  const [toast, setToast] = useState(null);
  const toastTimer = useRef(null);

  const tmdb = useMemo(() => buildTmdb(apiKey), [apiKey]);

  /* load everything once, pulling from the cloud first if connected */
  useEffect(() => {
    (async () => {
      const [settings, e, l, t] = await Promise.all([
        loadKey(STORE.settings, {}),
        loadKey(STORE.entries, {}),
        loadKey(STORE.lists, []),
        loadKey(STORE.top5, [null, null, null, null, null]),
      ]);
      setApiKey(settings.apiKey || "");
      setSyncUrl(settings.supabaseUrl || "");
      setSyncKey(settings.supabaseKey || "");

      let finalEntries = e;
      let finalLists = l;
      let finalTop5 = Array.isArray(t) && t.length === 5 ? t : [null, null, null, null, null];

      if (settings.supabaseUrl && settings.supabaseKey) {
        const cloud = await syncPullAll(settings.supabaseUrl, settings.supabaseKey);
        if (cloud) {
          if (cloud[STORE.entries] !== undefined) finalEntries = cloud[STORE.entries];
          if (cloud[STORE.lists] !== undefined) finalLists = cloud[STORE.lists];
          if (Array.isArray(cloud[STORE.top5]) && cloud[STORE.top5].length === 5) finalTop5 = cloud[STORE.top5];
          setSyncStatus("synced");
          // keep the local cache in step with what the cloud just gave us
          saveKey(STORE.entries, finalEntries);
          saveKey(STORE.lists, finalLists);
          saveKey(STORE.top5, finalTop5);
        } else {
          setSyncStatus("offline");
        }
      }

      setEntries(finalEntries);
      setLists(finalLists);
      setTop5(finalTop5);
      setLoaded(true);
    })();
  }, []);

  const notify = (msg) => {
    setToast(msg);
    window.clearTimeout(toastTimer.current);
    toastTimer.current = window.setTimeout(() => setToast(null), 2600);
  };

  const pushToCloud = (storeKey, value) => {
    if (!syncUrl || !syncKey) return;
    syncPush(syncUrl, syncKey, storeKey, value).then((ok) => setSyncStatus(ok ? "synced" : "offline"));
  };

  /* persistence wrappers */
  const persistEntries = async (next) => {
    setEntries(next);
    if (!(await saveKey(STORE.entries, next))) notify("Couldn't save — try again.");
    pushToCloud(STORE.entries, next);
  };
  const persistLists = async (next) => {
    setLists(next);
    if (!(await saveKey(STORE.lists, next))) notify("Couldn't save — try again.");
    pushToCloud(STORE.lists, next);
  };
  const persistTop5 = async (next) => {
    setTop5(next);
    if (!(await saveKey(STORE.top5, next))) notify("Couldn't save — try again.");
    pushToCloud(STORE.top5, next);
  };
  const persistKey = async (key) => {
    setApiKey(key);
    const settings = await loadKey(STORE.settings, {});
    if (await saveKey(STORE.settings, { ...settings, apiKey: key })) notify("API key saved.");
    else notify("Couldn't save the key — try again.");
  };

  /* cloud sync connect / disconnect */
  const connectSync = async (url, key) => {
    const cloud = await syncPullAll(url, key);
    if (cloud === null) {
      notify("Couldn't reach that Supabase project. Check the URL/key and try again.");
      return false;
    }
    const cloudHasData =
      cloud[STORE.entries] !== undefined || cloud[STORE.lists] !== undefined || cloud[STORE.top5] !== undefined;

    if (cloudHasData) {
      // another device already seeded this project — pull it down
      const nextEntries = cloud[STORE.entries] !== undefined ? cloud[STORE.entries] : {};
      const nextLists = cloud[STORE.lists] !== undefined ? cloud[STORE.lists] : [];
      const nextTop5 =
        Array.isArray(cloud[STORE.top5]) && cloud[STORE.top5].length === 5
          ? cloud[STORE.top5]
          : [null, null, null, null, null];
      await Promise.all([
        saveKey(STORE.entries, nextEntries),
        saveKey(STORE.lists, nextLists),
        saveKey(STORE.top5, nextTop5),
      ]);
      setEntries(nextEntries);
      setLists(nextLists);
      setTop5(nextTop5);
      notify("Connected — pulled your diary from the cloud.");
    } else {
      // first device to connect this project — seed it with what's already here
      await Promise.all([
        syncPush(url, key, STORE.entries, entries),
        syncPush(url, key, STORE.lists, lists),
        syncPush(url, key, STORE.top5, top5),
      ]);
      notify("Connected — this device's diary is now the shared copy.");
    }

    const settings = await loadKey(STORE.settings, {});
    await saveKey(STORE.settings, { ...settings, supabaseUrl: url, supabaseKey: key });
    setSyncUrl(url);
    setSyncKey(key);
    setSyncStatus("synced");
    return true;
  };

  const disconnectSync = async () => {
    const settings = await loadKey(STORE.settings, {});
    await saveKey(STORE.settings, { ...settings, supabaseUrl: "", supabaseKey: "" });
    setSyncUrl("");
    setSyncKey("");
    setSyncStatus("off");
    notify("Disconnected — this device keeps its own local copy from here.");
  };

  const entryList = useMemo(() => Object.values(entries), [entries]);

  const addEntry = async (entry) => {
    await persistEntries({ ...entries, [entry.id]: entry });
    notify(`Logged “${entry.title}.”`);
  };

  const updateEntry = async (id, patch) => {
    if (!entries[id]) return;
    await persistEntries({ ...entries, [id]: { ...entries[id], ...patch } });
  };

  const deleteEntry = async (id) => {
    const next = { ...entries };
    delete next[id];
    await persistEntries(next);
    await persistLists(lists.map((l) => ({ ...l, movieIds: l.movieIds.filter((m) => m !== id) })));
    await persistTop5(top5.map((m) => (m === id ? null : m)));
    setView({ name: "diary" });
    notify("Entry removed.");
  };

  if (!loaded) {
    return (
      <div className="mvd">
        <StyleTag />
        <div className="loading-house">Dimming the house lights…</div>
      </div>
    );
  }

  return (
    <div className="mvd">
      <StyleTag />
      <header className="topbar">
        <button className="wordmark" onClick={() => setView({ name: "diary" })}>
          MARQUEE<span className="wordmark-sub">a movie diary</span>
        </button>
        <nav className="nav" aria-label="Main">
          {[
            ["diary", "Diary"],
            ["lists", "Lists"],
            ["top5", "Top 5"],
            ["stats", "Stats"],
            ["settings", "Settings"],
          ].map(([name, label]) => (
            <button
              key={name}
              className={"nav-link" + (view.name === name ? " active" : "")}
              aria-current={view.name === name ? "page" : undefined}
              onClick={() => setView({ name })}
            >
              {label}
            </button>
          ))}
        </nav>
        <button className="btn-log" onClick={() => setLogOpen(true)}>+ Log a movie</button>
      </header>

      <main className="stage">
        {view.name === "diary" && (
          <DiaryGrid entries={entryList} openDetail={(id) => setView({ name: "detail", id })} onLog={() => setLogOpen(true)} />
        )}
        {view.name === "detail" && entries[view.id] && (
          <DetailPage
            entry={entries[view.id]}
            tmdb={tmdb}
            lists={lists}
            onBack={() => setView({ name: "diary" })}
            onUpdate={(patch) => updateEntry(view.id, patch)}
            onDelete={() => deleteEntry(view.id)}
            onAddToList={(listId) => {
              const next = lists.map((l) =>
                l.id === listId && !l.movieIds.includes(view.id)
                  ? { ...l, movieIds: [...l.movieIds, view.id] }
                  : l
              );
              persistLists(next);
              notify("Added to list.");
            }}
            notify={notify}
          />
        )}
        {view.name === "lists" && (
          <ListsPage
            lists={lists}
            entries={entries}
            onCreate={(name) => persistLists([...lists, { id: uid(), name, movieIds: [] }])}
            onOpen={(id) => setView({ name: "list", id })}
            onDelete={(id) => persistLists(lists.filter((l) => l.id !== id))}
          />
        )}
        {view.name === "list" && (
          <ListDetail
            list={lists.find((l) => l.id === view.id)}
            entries={entries}
            onBack={() => setView({ name: "lists" })}
            onOpenMovie={(id) => setView({ name: "detail", id })}
            onUpdate={(patch) =>
              persistLists(lists.map((l) => (l.id === view.id ? { ...l, ...patch } : l)))
            }
          />
        )}
        {view.name === "top5" && (
          <Top5Page
            top5={top5}
            entries={entries}
            onChange={persistTop5}
            onOpenMovie={(id) => setView({ name: "detail", id })}
          />
        )}
        {view.name === "stats" && <StatsPage entries={entryList} />}
        {view.name === "settings" && (
          <SettingsPage
            apiKey={apiKey}
            onSave={persistKey}
            tmdb={tmdb}
            syncUrl={syncUrl}
            syncKey={syncKey}
            syncStatus={syncStatus}
            onConnectSync={connectSync}
            onDisconnectSync={disconnectSync}
          />
        )}
      </main>

      {logOpen && (
        <LogModal
          tmdb={tmdb}
          hasKey={!!apiKey}
          existing={entries}
          onClose={() => setLogOpen(false)}
          onSave={async (entry) => {
            await addEntry(entry);
            setLogOpen(false);
          }}
          goSettings={() => {
            setLogOpen(false);
            setView({ name: "settings" });
          }}
        />
      )}

      {toast && <div className="toast" role="status">{toast}</div>}
    </div>
  );
}

/* ---------------- diary grid ---------------- */

function DiaryGrid({ entries, openDetail, onLog }) {
  const [sort, setSort] = useState("watched-desc");
  const [minRating, setMinRating] = useState(0);
  const [query, setQuery] = useState("");

  const shown = useMemo(() => {
    let list = entries.filter(
      (e) => e.rating >= minRating && e.title.toLowerCase().includes(query.toLowerCase())
    );
    const by = {
      "watched-desc": (a, b) => b.watchedDate.localeCompare(a.watchedDate) || b.loggedAt - a.loggedAt,
      "watched-asc": (a, b) => a.watchedDate.localeCompare(b.watchedDate) || a.loggedAt - b.loggedAt,
      "rating-desc": (a, b) => b.rating - a.rating,
      "rating-asc": (a, b) => a.rating - b.rating,
      "title": (a, b) => a.title.localeCompare(b.title),
      "year-desc": (a, b) => (b.releaseDate || "").localeCompare(a.releaseDate || ""),
      "year-asc": (a, b) => (a.releaseDate || "").localeCompare(b.releaseDate || ""),
    };
    return [...list].sort(by[sort]);
  }, [entries, sort, minRating, query]);

  if (entries.length === 0) {
    return (
      <div className="empty-house">
        <div className="empty-mark" aria-hidden="true">✦</div>
        <h2>Nothing on the marquee yet</h2>
        <p>Log the first movie you've watched and your diary starts here.</p>
        <button className="btn-log" onClick={onLog}>+ Log a movie</button>
      </div>
    );
  }

  return (
    <section>
      <div className="controls">
        <label className="ctrl">
          <span>Sort</span>
          <select value={sort} onChange={(e) => setSort(e.target.value)}>
            <option value="watched-desc">Watched — newest</option>
            <option value="watched-asc">Watched — oldest</option>
            <option value="rating-desc">Rating — highest</option>
            <option value="rating-asc">Rating — lowest</option>
            <option value="title">Title A–Z</option>
            <option value="year-desc">Release year — newest</option>
            <option value="year-asc">Release year — oldest</option>
          </select>
        </label>
        <label className="ctrl">
          <span>Rated at least</span>
          <select value={minRating} onChange={(e) => setMinRating(Number(e.target.value))}>
            <option value={0}>Any rating</option>
            {[1, 2, 3, 3.5, 4, 4.5, 5].map((r) => (
              <option key={r} value={r}>{r}★ +</option>
            ))}
          </select>
        </label>
        <label className="ctrl grow">
          <span>Find</span>
          <input
            type="search"
            placeholder="Search your diary…"
            value={query}
            onChange={(e) => setQuery(e.target.value)}
          />
        </label>
        <div className="count">{shown.length} of {entries.length}</div>
      </div>

      <div className="grid">
        {shown.map((e) => (
          <TicketCard key={e.id} entry={e} onOpen={() => openDetail(e.id)} />
        ))}
      </div>
      {shown.length === 0 && <p className="quiet-note">No entries match those filters.</p>}
    </section>
  );
}

/* ---------------- log modal (search + form) ---------------- */

function LogModal({ tmdb, hasKey, existing, onClose, onSave, goSettings }) {
  const [query, setQuery] = useState("");
  const [results, setResults] = useState([]);
  const [searching, setSearching] = useState(false);
  const [error, setError] = useState(null);
  const [picked, setPicked] = useState(null); // TMDB movie object
  const [rating, setRating] = useState(0);
  const [watchedDate, setWatchedDate] = useState(todayISO());
  const [review, setReview] = useState("");
  const inputRef = useRef(null);
  const timer = useRef(null);

  useEffect(() => {
    inputRef.current && inputRef.current.focus();
  }, []);

  useEffect(() => {
    const onKey = (e) => e.key === "Escape" && onClose();
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [onClose]);

  useEffect(() => {
    window.clearTimeout(timer.current);
    if (!query.trim()) {
      setResults([]);
      setError(null);
      return;
    }
    timer.current = window.setTimeout(async () => {
      setSearching(true);
      setError(null);
      try {
        const data = await tmdb("/search/movie", { query: query.trim(), include_adult: "false" });
        setResults((data.results || []).slice(0, 12));
      } catch (err) {
        setError(friendlyError(err));
        setResults([]);
      } finally {
        setSearching(false);
      }
    }, 400);
    return () => window.clearTimeout(timer.current);
  }, [query, tmdb]);

  const save = async () => {
    if (!picked || !rating) return;
    let genres = [];
    let runtime = null;
    try {
      const detail = await tmdb("/movie/" + picked.id, {});
      genres = (detail.genres || []).map((g) => g.name);
      runtime = detail.runtime || null;
    } catch (e) {
      /* not critical — log without genre data */
    }
    onSave({
      id: String(picked.id),
      title: picked.title,
      releaseDate: picked.release_date || "",
      posterPath: picked.poster_path || null,
      chosenPoster: null,
      rating,
      review: review.trim(),
      watchedDate,
      genres,
      runtime,
      loggedAt: Date.now(),
    });
  };

  return (
    <div className="overlay" onMouseDown={(e) => e.target === e.currentTarget && onClose()}>
      <div className="modal" role="dialog" aria-modal="true" aria-label="Log a movie">
        <div className="modal-head">
          <h2>{picked ? "Now showing" : "Log a movie"}</h2>
          <button className="btn-ghost" onClick={onClose} aria-label="Close">✕</button>
        </div>

        {!hasKey && (
          <div className="notice">
            You'll need a TMDB API key before searching.{" "}
            <button className="link" onClick={goSettings}>Open Settings</button>
          </div>
        )}

        {!picked && (
          <>
            <input
              ref={inputRef}
              className="search-big"
              type="search"
              placeholder="Search TMDB by title…"
              value={query}
              onChange={(e) => setQuery(e.target.value)}
              disabled={!hasKey}
            />
            {error && <div className="notice error">{error}</div>}
            {searching && <div className="quiet-note">Searching…</div>}
            <ul className="results">
              {results.map((m) => (
                <li key={m.id}>
                  <button className="result" onClick={() => setPicked(m)}>
                    {m.poster_path ? (
                      <img src={IMG + "w92" + m.poster_path} alt="" loading="lazy" />
                    ) : (
                      <div className="thumb-blank" aria-hidden="true" />
                    )}
                    <span className="result-title">{m.title}</span>
                    <span className="result-year">{m.release_date ? m.release_date.slice(0, 4) : ""}</span>
                    {existing[String(m.id)] && <span className="result-flag">already logged</span>}
                  </button>
                </li>
              ))}
            </ul>
            {!searching && query && results.length === 0 && !error && hasKey && (
              <p className="quiet-note">No matches. Check the spelling or try a shorter title.</p>
            )}
          </>
        )}

        {picked && (
          <div className="log-form">
            <div className="log-form-poster">
              {picked.poster_path ? (
                <img src={IMG + "w342" + picked.poster_path} alt={picked.title + " poster"} />
              ) : (
                <div className="poster-blank"><span>{picked.title}</span></div>
              )}
            </div>
            <div className="log-form-fields">
              <h3 className="film-title">{picked.title}
                <span className="film-year"> {picked.release_date ? picked.release_date.slice(0, 4) : ""}</span>
              </h3>
              <label className="field">
                <span>Watched on</span>
                <input type="date" value={watchedDate} max={todayISO()} onChange={(e) => setWatchedDate(e.target.value)} />
              </label>
              <div className="field">
                <span>Your rating</span>
                <StarInput value={rating} onChange={setRating} />
              </div>
              <label className="field">
                <span>Review <em>(optional)</em></span>
                <textarea
                  rows={5}
                  placeholder="What stuck with you?"
                  value={review}
                  onChange={(e) => setReview(e.target.value)}
                />
              </label>
              <div className="row-end">
                <button className="btn-ghost" onClick={() => setPicked(null)}>← Back to search</button>
                <button className="btn-log" disabled={!rating} onClick={save}>
                  {rating ? "Add to diary" : "Pick a rating first"}
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

    setLoadingPosters(true);
    setPostersError(null);
    try {
      const data = await tmdb("/movie/" + entry.id + "/images", {});
      const sorted = (data.posters || []).sort((a, b) => b.vote_count - a.vote_count);

      setPostersError(friendlyError(err));
    } finally {

    <section className="detail">

      <div className="detail-main">

            <img src={IMG + "w500" + poster} alt={entry.title + " poster"} />
          ) : (
            <div className="poster-blank tall"><span>{entry.title}</span></div>
          )}
        </div>

        <div className="detail-info">
          <h1 className="film-title big">{entry.title}
            <span className="film-year"> {yearOf(entry)}</span>

          <div className="detail-facts">
            {entry.genres && entry.genres.length > 0 && <span>{entry.genres.join(" · ")}</span>}
            {entry.runtime && <span>{entry.runtime} min</span>}
          </div>

          <div className="field">
            <span>Your rating</span>
            <StarInput value={entry.rating} onChange={(r) => onUpdate({ rating: r })} />
          </div>

          <label className="field">
            <span>Watched on</span>
            <input
              type="date"
              value={entry.watchedDate}
              max={todayISO()}
              onChange={(e) => onUpdate({ watchedDate: e.target.value })}
            />
          </label>

          <div className="field">
            <span>Review</span>
            {editingReview ? (
              <>
                <textarea rows={6} value={reviewDraft} onChange={(e) => setReviewDraft(e.target.value)} />
                <div className="row-end">
                  <button className="btn-ghost" onClick={() => { setReviewDraft(entry.review); setEditingReview(false); }}>Cancel</button>
                  <button className="btn-log" onClick={() => { onUpdate({ review: reviewDraft.trim() }); setEditingReview(false); }}>Save review</button>
                </div>
              </>
            ) : (
              <>
                {entry.review ? <p className="review-text">{entry.review}</p> : <p className="quiet-note">No review yet.</p>}
                <button className="btn-ghost" onClick={() => { setReviewDraft(entry.review); setEditingReview(true); }}>
                  {entry.review ? "Edit review" : "Write a review"}
                </button>
              </>
            )}
          </div>

          {lists.length > 0 && (
            <div className="field">
              <span>Add to a list</span>
              <div className="row">
                <select value={listPick} onChange={(e) => setListPick(e.target.value)}>
                  <option value="">Choose a list…</option>
                  {lists.map((l) => (
                    <option key={l.id} value={l.id} disabled={l.movieIds.includes(entry.id)}>
                      {l.name}{l.movieIds.includes(entry.id) ? " (already in)" : ""}
                    </option>
                  ))}
                </select>
                <button className="btn-ghost" disabled={!listPick} onClick={() => { onAddToList(listPick); setListPick(""); }}>
                  Add
                </button>
              </div>
            </div>
          )}

          <div className="danger-zone">
            {confirmDelete ? (
              <div className="row">
                <span className="quiet-note">Remove this entry and its review?</span>
                <button className="btn-danger" onClick={onDelete}>Yes, remove</button>
                <button className="btn-ghost" onClick={() => setConfirmDelete(false)}>Keep it</button>

              <button className="btn-ghost danger" onClick={() => setConfirmDelete(true)}>Remove from diary</button>

      <div className="poster-picker">

        {loadingPosters && <p className="quiet-note">Pulling posters…</p>}
        {postersError && (
          <div className="notice error">

        {posters && posters.length > 0 && (
          <>
            <p className="quiet-note">{posters.length} posters · click one to make it this entry's poster</p>
            <div className="poster-grid">
              {posters.map((p) => {

function ListDetail({ list, entries, onBack, onOpenMovie, onUpdate }) {
  const [renaming, setRenaming] = useState(false);
  const [nameDraft, setNameDraft] = useState(list ? list.name : "");

  if (!list) return <p className="quiet-note">That list is gone.</p>;

  const move = (idx, dir) => {
    const next = [...list.movieIds];
    const j = idx + dir;
    if (j < 0 || j >= next.length) return;
    [next[idx], next[j]] = [next[j], next[idx]];
    onUpdate({ movieIds: next });
  };

  return (
    <section>
      <button className="btn-ghost back" onClick={onBack}>← Lists</button>
      {renaming ? (
        <div className="row">
          <input type="text" value={nameDraft} onChange={(e) => setNameDraft(e.target.value)} />
          <button className="btn-log" onClick={() => { onUpdate({ name: nameDraft.trim() || list.name }); setRenaming(false); }}>Save</button>
        </div>
      ) : (
        <h1 className="page-head">
          {list.name}{" "}
          <button className="btn-ghost" onClick={() => { setNameDraft(list.name); setRenaming(true); }}>Rename</button>
        </h1>
      )}

      {list.movieIds.length === 0 && (
        <p className="quiet-note">Empty so far. Open any movie in your diary and use “Add to a list.”</p>
      )}

      <ol className="list-rows">
        {list.movieIds.map((id, idx) => {
          const e = entries[id];
          if (!e) return null;
          const p = e.chosenPoster || e.posterPath;
          return (
            <li className="list-row" key={id}>
              <span className="list-row-num">{idx + 1}</span>
              <button className="list-row-main" onClick={() => onOpenMovie(id)}>
                {p ? <img src={IMG + "w92" + p} alt="" loading="lazy" /> : <div className="thumb-blank" />}
                <span className="result-title">{e.title}</span>
                <span className="result-year">{yearOf(e)}</span>
                <StarDisplay value={e.rating} size={12} />
              </button>
              <div className="row-btns">
                <button className="btn-ghost" onClick={() => move(idx, -1)} disabled={idx === 0} aria-label={`Move ${e.title} up`}>↑</button>
                <button className="btn-ghost" onClick={() => move(idx, 1)} disabled={idx === list.movieIds.length - 1} aria-label={`Move ${e.title} down`}>↓</button>
                <button
                  className="btn-ghost danger"
                  aria-label={`Remove ${e.title} from list`}
                  onClick={() => onUpdate({ movieIds: list.movieIds.filter((m) => m !== id) })}
                >✕</button>
              </div>
            </li>
          );
        })}
      </ol>
    </section>
  );
}

/* ---------------- top 5 ---------------- */

function Top5Page({ top5, entries, onChange, onOpenMovie }) {
  const [pickingSlot, setPickingSlot] = useState(null);
  const [filter, setFilter] = useState("");

  const candidates = useMemo(
    () =>
      Object.values(entries)
        .filter((e) => e.title.toLowerCase().includes(filter.toLowerCase()))
        .sort((a, b) => b.rating - a.rating),
    [entries, filter]
  );

  const setSlot = (slot, id) => {
    const next = top5.map((m) => (m === id ? null : m)); // no duplicates
    next[slot] = id;
    onChange(next);
    setPickingSlot(null);
    setFilter("");
  };

  const move = (idx, dir) => {
    const j = idx + dir;
    if (j < 0 || j > 4) return;
    const next = [...top5];
    [next[idx], next[j]] = [next[j], next[idx]];
    onChange(next);
  };

  return (
    <section>
      <h1 className="page-head">The Top Five</h1>
      <p className="quiet-note">Your five, in order. Change your mind anytime — the marquee updates.</p>

      <ol className="marquee-board">
        {top5.map((id, idx) => {
          const e = id ? entries[id] : null;
          const p = e ? e.chosenPoster || e.posterPath : null;
          return (
            <li className={"marquee-slot" + (e ? " filled" : "")} key={idx}>
              <span className="marquee-num" aria-hidden="true">{idx + 1}</span>
              {e ? (
                <>
                  <button className="marquee-poster" onClick={() => onOpenMovie(id)} aria-label={`Open ${e.title}`}>
                    {p ? <img src={IMG + "w342" + p} alt="" loading="lazy" /> : <div className="poster-blank"><span>{e.title}</span></div>}
                  </button>
                  <div className="marquee-title">{e.title}</div>
                  <div className="row-btns center">
                    <button className="btn-ghost" onClick={() => move(idx, -1)} disabled={idx === 0} aria-label="Move up in ranking">↑</button>
                    <button className="btn-ghost" onClick={() => move(idx, 1)} disabled={idx === 4} aria-label="Move down in ranking">↓</button>
                    <button className="btn-ghost" onClick={() => setPickingSlot(idx)} aria-label={`Replace number ${idx + 1}`}>swap</button>
                    <button className="btn-ghost danger" onClick={() => setSlot(idx, null)} aria-label={`Clear number ${idx + 1}`}>✕</button>
                  </div>
                </>
              ) : (
                <button className="marquee-empty" onClick={() => setPickingSlot(idx)}>
                  Pick № {idx + 1}
                </button>
              )}
            </li>
          );
        })}
      </ol>

      {pickingSlot != null && (
        <div className="overlay" onMouseDown={(e) => e.target === e.currentTarget && setPickingSlot(null)}>
          <div className="modal" role="dialog" aria-modal="true" aria-label={`Pick number ${pickingSlot + 1}`}>
            <div className="modal-head">
              <h2>Pick № {pickingSlot + 1}</h2>
              <button className="btn-ghost" onClick={() => setPickingSlot(null)} aria-label="Close">✕</button>
            </div>
            {Object.keys(entries).length === 0 ? (
              <p className="quiet-note">Log some movies first — the Top 5 draws from your diary.</p>
            ) : (
              <>
                <input
                  className="search-big"
                  type="search"
                  placeholder="Filter your diary…"
                  value={filter}
                  onChange={(e) => setFilter(e.target.value)}
                  autoFocus
                />
                <ul className="results">
                  {candidates.map((e) => (
                    <li key={e.id}>
                      <button className="result" onClick={() => setSlot(pickingSlot, e.id)}>
                        {(e.chosenPoster || e.posterPath) ? (
                          <img src={IMG + "w92" + (e.chosenPoster || e.posterPath)} alt="" loading="lazy" />
                        ) : (
                          <div className="thumb-blank" />
                        )}
                        <span className="result-title">{e.title}</span>
                        <span className="result-year">{yearOf(e)}</span>
                        <StarDisplay value={e.rating} size={12} />
                      </button>
                    </li>
                  ))}
                </ul>
              </>
            )}
          </div>
        </div>
      )}
    </section>
  );
}

/* ---------------- stats ---------------- */

function StatsPage({ entries }) {
  const stats = useMemo(() => {
    if (entries.length === 0) return null;
    const avg = entries.reduce((s, e) => s + e.rating, 0) / entries.length;

    const genreCount = {};
    entries.forEach((e) => (e.genres || []).forEach((g) => (genreCount[g] = (genreCount[g] || 0) + 1)));
    const topGenre = Object.entries(genreCount).sort((a, b) => b[1] - a[1])[0];

    const decadeCount = {};
    entries.forEach((e) => {
      const y = e.releaseDate ? Number(e.releaseDate.slice(0, 4)) : null;
      if (y) {
        const d = Math.floor(y / 10) * 10;
        decadeCount[d] = (decadeCount[d] || 0) + 1;
      }
    });
    const topDecade = Object.entries(decadeCount).sort((a, b) => b[1] - a[1])[0];

    // last 12 months
    const months = [];
    const now = new Date();
    for (let i = 11; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
      months.push({ key, label: d.toLocaleDateString(undefined, { month: "short" }), count: 0 });
    }
    entries.forEach((e) => {
      const key = (e.watchedDate || "").slice(0, 7);
      const m = months.find((x) => x.key === key);
      if (m) m.count++;
    });
    const maxMonth = Math.max(1, ...months.map((m) => m.count));

    const ratingDist = {};
    entries.forEach((e) => (ratingDist[e.rating] = (ratingDist[e.rating] || 0) + 1));

    return { avg, topGenre, topDecade, months, maxMonth, ratingDist };
  }, [entries]);

  if (!stats) {
    return (
      <section>
        <h1 className="page-head">Stats</h1>
        <p className="quiet-note">Numbers show up once you've logged a few movies.</p>
      </section>
    );
  }

  return (
    <section>
      <h1 className="page-head">Stats</h1>
      <div className="stat-cards">
        <div className="stat-card">
          <div className="stat-num">{entries.length}</div>
          <div className="stat-label">movies logged</div>
        </div>
        <div className="stat-card">
          <div className="stat-num">{stats.avg.toFixed(2)}</div>
          <div className="stat-label">average rating</div>
        </div>
        <div className="stat-card">
          <div className="stat-num small">{stats.topGenre ? stats.topGenre[0] : "—"}</div>
          <div className="stat-label">most-logged genre{stats.topGenre ? ` (${stats.topGenre[1]})` : ""}</div>
        </div>
        <div className="stat-card">
          <div className="stat-num small">{stats.topDecade ? stats.topDecade[0] + "s" : "—"}</div>
          <div className="stat-label">most-logged decade{stats.topDecade ? ` (${stats.topDecade[1]})` : ""}</div>
        </div>
      </div>

      <h2 className="section-head">Movies per month</h2>
      <div className="bar-chart" role="img" aria-label="Movies watched per month over the last year">
        {stats.months.map((m) => (
          <div className="bar-col" key={m.key}>
            <div className="bar-val">{m.count > 0 ? m.count : ""}</div>
            <div className="bar" style={{ height: (m.count / stats.maxMonth) * 120 + "px" }} />
            <div className="bar-label">{m.label}</div>
          </div>
        ))}
      </div>

      <h2 className="section-head">Ratings</h2>
      <div className="rating-dist">
        {[0.5, 1, 1.5, 2, 2.5, 3, 3.5, 4, 4.5, 5].map((r) => {
          const c = stats.ratingDist[r] || 0;
          const max = Math.max(1, ...Object.values(stats.ratingDist));
          return (
            <div className="dist-row" key={r}>
              <span className="dist-label">{r}★</span>
              <div className="dist-track">
                <div className="dist-bar" style={{ width: (c / max) * 100 + "%" }} />
              </div>
              <span className="dist-count">{c || ""}</span>
            </div>
          );
        })}
      </div>
    </section>
  );
}

/* ---------------- settings ---------------- */

function SettingsPage({ apiKey, onSave, tmdb, syncUrl, syncKey, syncStatus, onConnectSync, onDisconnectSync }) {
  const [draft, setDraft] = useState(apiKey);
  const [testState, setTestState] = useState(null); // null | 'testing' | 'ok' | error string

  const [urlDraft, setUrlDraft] = useState(syncUrl);
  const [keyDraft, setKeyDraft] = useState(syncKey);
  const [connecting, setConnecting] = useState(false);
  const connected = !!(syncUrl && syncKey);

  const test = async () => {
    setTestState("testing");
    try {
      const t = buildTmdb(draft.trim());
      await t("/configuration", {});
      setTestState("ok");
    } catch (err) {
      setTestState(friendlyError(err));
    }
  };

  const connect = async () => {
    if (!urlDraft.trim() || !keyDraft.trim()) return;
    setConnecting(true);
    await onConnectSync(urlDraft.trim(), keyDraft.trim());
    setConnecting(false);
  };

  return (
    <section className="settings">
      <h1 className="page-head">Settings</h1>
      <div className="field">
        <span>TMDB API key</span>
        <input
          type="text"
          value={draft}
          onChange={(e) => { setDraft(e.target.value); setTestState(null); }}
          placeholder="Paste your v3 API key or v4 read access token"
          autoComplete="off"
          spellCheck={false}
        />
        <p className="quiet-note">
          Free from themoviedb.org — sign in, then Settings → API. Either the short v3 key or the long
          v4 token works here. It's stored only in this browser's local storage, on this device — never sent anywhere but TMDB.
        </p>
      </div>
      <div className="row">
        <button className="btn-log" disabled={!draft.trim()} onClick={() => onSave(draft.trim())}>Save key</button>
        <button className="btn-ghost" disabled={!draft.trim() || testState === "testing"} onClick={test}>
          {testState === "testing" ? "Testing…" : "Test connection"}
        </button>
      </div>
      {testState === "ok" && <div className="notice good">Key works — TMDB answered.</div>}
      {testState && testState !== "ok" && testState !== "testing" && <div className="notice error">{testState}</div>}

      <h2 className="section-head">Cloud sync</h2>
      <p className="quiet-note">
        Optional. Connect a free Supabase project to keep the same diary in sync across every device.
        Setup steps and the one-time SQL are in the repo's README.
      </p>

      {connected ? (
        <>
          <div className={"notice " + (syncStatus === "offline" ? "error" : "good")}>
            {syncStatus === "offline"
              ? "Connected, but couldn't reach Supabase just now — using this device's local copy until it's back."
              : "Connected — this diary syncs across every device you connect."}
          </div>
          <p className="quiet-note" style={{ wordBreak: "break-all" }}>{syncUrl}</p>
          <button className="btn-ghost danger" onClick={onDisconnectSync}>Disconnect this device</button>
        </>
      ) : (
        <>
          <div className="field">
            <span>Supabase project URL</span>
            <input
              type="text"
              value={urlDraft}
              onChange={(e) => setUrlDraft(e.target.value)}
              placeholder="https://xxxxxxxx.supabase.co"
              autoComplete="off"
              spellCheck={false}
            />
          </div>
          <div className="field">
            <span>Supabase anon public key</span>
            <input
              type="text"
              value={keyDraft}
              onChange={(e) => setKeyDraft(e.target.value)}
              placeholder="Paste the anon/public API key"
              autoComplete="off"
              spellCheck={false}
            />
          </div>
          <button className="btn-log" disabled={!urlDraft.trim() || !keyDraft.trim() || connecting} onClick={connect}>
            {connecting ? "Connecting…" : "Connect"}
          </button>
          <p className="quiet-note">
            First device you connect uploads its diary as the shared copy. Any device you connect after
            that pulls that copy down — connect your main device first.
          </p>
        </>
      )}
    </section>
  );
}
