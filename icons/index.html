.mvd button { font-family: inherit; cursor: pointer; }
.mvd :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 0; }
.mvd img { display: block; }

/* ---- top bar ---- */
.topbar {
  border-bottom: 1px solid var(--line);
  background: rgba(18,21,27,.94);
  position: sticky; top: 0; z-index: 20;
  backdrop-filter: blur(10px);
}
.topbar-inner {
  width: 100%; max-width: 1240px; margin: 0 auto;
  padding: calc(10px + env(safe-area-inset-top)) 22px 10px;
  display: flex; align-items: center; justify-content: space-between; gap: 30px;
}
.brand {
  background: none; border: none; color: var(--accent); padding: 0;
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  font-weight: 800; font-size: 17px; letter-spacing: .12em; line-height: 1;
}
.logo-mark { fill: var(--accent); flex-shrink: 0; }
.desktop-nav { display: flex; align-items: center; align-self: stretch; gap: 24px; }
.desktop-nav button {
  align-self: stretch; background: none; border: none; border-bottom: 2px solid transparent;
  color: var(--text-muted); padding: 0; font-size: 10px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
}
.desktop-nav button:hover { color: var(--text); }
.desktop-nav button.active { color: var(--text); border-bottom-color: var(--accent); }
.desktop-nav .desktop-log {
  align-self: center; background: var(--accent); color: #0f151a;
  border: none; padding: 9px 17px;
}
.desktop-nav .desktop-log:hover { background: #a8d9ef; color: #0f151a; }
.desktop-nav .desktop-log:focus-visible { outline-offset: 3px; }

/* ---- bottom tab bar ---- */
.bottombar {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 20;
  display: none; align-items: center; justify-content: space-around;
  background: rgba(15,17,21,.96);
  border-top: 1px solid var(--line);
  backdrop-filter: blur(14px);
  padding: 5px 4px calc(5px + env(safe-area-inset-bottom));
}
.tab-link {
  background: none; border: none; color: var(--text-muted);
  display: flex; align-items: center; justify-content: center;
  padding: 13px 8px; flex: 1; max-width: 112px;
}
.tab-link .tab-label { font-size: 10px; letter-spacing: .1em; font-weight: 700; text-transform: uppercase; }
.tab-link:hover { color: var(--text); }
.tab-link.active { color: var(--accent); }
.tab-link-log {
  background: var(--accent); color: #0f151a; border: none;
  width: 58px; height: 38px; border-radius: 0; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  margin: 0 8px;
}
.tab-link-log:hover { background: #a8d9ef; }
.tab-link-log-label { font-size: 10px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; }

.btn-log {
  background: var(--accent); color: #12181d; border: none;
  font-weight: 700; font-size: 13px; letter-spacing: .02em;
  padding: 10px 18px; border-radius: 0;
}
.btn-log:hover:not(:disabled) { background: #a8d9ef; }
.btn-log:disabled { opacity: .45; cursor: default; }
.btn-ghost {
  background: none; border: 1px solid var(--line); color: var(--text-muted);
  font-size: 13px; font-weight: 600; padding: 7px 12px; border-radius: 0;
}
.btn-ghost:hover:not(:disabled) { color: var(--text); border-color: var(--accent-muted); }
.btn-ghost:disabled { opacity: .35; cursor: default; }
.btn-ghost.danger:hover { color: #f0898d; border-color: var(--danger); }
.btn-danger {
  background: var(--danger); color: var(--text); border: none;
  font-size: 13px; font-weight: 600; padding: 8px 14px; border-radius: 0;
}
.link { background: none; border: none; color: var(--accent); text-decoration: underline; padding: 0; font-size: inherit; }

.stage { max-width: 1240px; margin: 0 auto; padding: 32px 22px 52px; }

.app-loader {
  min-height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
  font-family: var(--body); font-weight: 600; letter-spacing: .06em; color: var(--text-muted);
}

/* ---- headings ---- */
.page-head {
  font-family: var(--body); font-weight: 800; font-size: clamp(24px, 4vw, 34px);
  letter-spacing: -.04em; color: var(--text);
  margin: 0 0 22px;
}
.section-head {
  font-family: var(--body); font-weight: 700; font-size: 12px;
  letter-spacing: .14em; text-transform: uppercase; color: var(--text-muted);
  border-bottom: 1px solid var(--line); padding-bottom: 8px; margin: 38px 0 14px;
}
.film-title { font-family: var(--body); font-weight: 800; font-size: 21px; margin: 0 0 10px; letter-spacing: -.01em; }
.film-title.big { font-size: 27px; }
.film-year { color: var(--text-muted); font-weight: 500; font-size: .68em; letter-spacing: .04em; }
.quiet-note { color: var(--text-muted); font-size: 13px; }
.quiet-note em, .field em { color: var(--text-muted); font-style: italic; font-size: 12px; }

/* ---- films header and view tabs ---- */
.films-head {
  display: flex; align-items: flex-end; justify-content: space-between; gap: 24px;
  border-bottom: 1px solid var(--line); margin-bottom: 22px;
}
.films-head .page-head { margin-bottom: 13px; }
.top-tabs {
  display: inline-flex; align-self: stretch; gap: 24px;
}
.top-tab {
  background: none; border: none; color: var(--text-muted);
  border-bottom: 2px solid transparent;
  font-family: var(--body); font-weight: 700; font-size: 11px;
  letter-spacing: .1em; text-transform: uppercase;
  padding: 4px 0 11px; border-radius: 0;
}
.top-tab.active { color: var(--text); border-bottom-color: var(--accent); }
.top-tab:hover:not(.active) { color: var(--text); }

/* ---- top 5 strip (Films tab) ---- */
.top5-strip { margin-bottom: 10px; }
.top5-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 18px; margin: 6px 0 22px; }
.top5-head h2 { font-size: 22px; letter-spacing: -.025em; margin: 2px 0 0; }
.eyebrow { color: var(--accent); font-size: 10px; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; }
.btn-ghost.active { color: var(--bg); background: var(--accent); border-color: var(--accent); }

/* ---- collapsed controls (Films tab) ---- */
.controls-collapsed { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
.pill-select {
  background: transparent; color: var(--text);
  border: 1px solid var(--line); border-radius: 0;
  padding: 7px 12px; font-size: 12.5px; font-weight: 600; max-width: 150px;
}
.icon-btn {
  background: transparent; border: 1px solid var(--line); color: var(--text-muted);
  width: 32px; height: 32px; border-radius: 0; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; padding: 0;
}
.icon-btn svg { width: 16px; height: 16px; }
.icon-btn:hover { color: var(--text); border-color: var(--accent-muted); }
.icon-btn:disabled { opacity: .3; cursor: default; }
.icon-btn.danger:hover { color: #f0898d; border-color: var(--danger); }
.search-expand { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 140px; }
.search-expand input { flex: 1; border-radius: 0; padding: 7px 14px; font-size: 13px; }
.controls-collapsed .count { color: var(--text-muted); font-size: 11.5px; margin-left: auto; }

.mvd select, .mvd input[type="search"], .mvd input[type="text"], .mvd input[type="date"], .mvd textarea {
  background: var(--surface); color: var(--text);
  border: 1px solid var(--line); border-radius: 0;
  padding: 8px 10px; font-family: var(--body); font-size: 14px;
}
.mvd textarea { resize: vertical; width: 100%; }
.mvd select:focus, .mvd input:focus, .mvd textarea:focus { border-color: var(--accent); outline: none; }

/* ---- film cards (poster-forward, no chrome) ---- */
.grid {
  display: grid; gap: 20px;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
}
.film-card {
  background: none; border: none; padding: 0; text-align: left;
  display: flex; flex-direction: column; gap: 7px;
}
.film-card-poster {
  aspect-ratio: 2/3; border-radius: 0; overflow: hidden;
  background: var(--surface-raised);
  outline: 1px solid rgba(255,255,255,.07); outline-offset: -1px;
  transition: transform .16s ease, outline-color .16s ease;
}
.film-card-poster img { width: 100%; height: 100%; object-fit: cover; }
.film-card:hover .film-card-poster, .film-card:focus-visible .film-card-poster {
  transform: translateY(-3px); outline-color: var(--accent);
}
@media (prefers-reduced-motion: reduce) {
  .film-card-poster, .film-card:hover .film-card-poster { transition: none; transform: none; }
}
.film-card-title {
  font-family: var(--body); font-weight: 650; font-size: 13px; letter-spacing: -.01em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--text-muted);
}
.film-card:hover .film-card-title { color: var(--text); }
.film-card-meta { display: flex; justify-content: space-between; align-items: center; gap: 6px; }
.film-card-date { color: var(--text-muted); font-size: 10.5px; }

.poster-blank {
  width: 100%; height: 100%; min-height: 120px;
  display: grid; place-items: center; text-align: center;
  background: var(--surface-raised); color: var(--text-muted);
  font-family: var(--body); font-weight: 600; padding: 10px;
}
.poster-blank.tall { aspect-ratio: 2/3; }

/* ---- stars ---- */
.stars, .star-input { display: inline-flex; align-items: center; line-height: 1; }
.star-wrap { position: relative; display: inline-block; }
.star-empty { color: rgba(244,242,238,.16); }
.star-fill {
  position: absolute; left: 0; top: 0; overflow: hidden; white-space: nowrap;
  color: var(--accent); pointer-events: none;
}
.star-input { gap: 0; cursor: pointer; border-radius: 0; padding: 2px; }
.half-hit { position: absolute; top: 0; height: 100%; width: 50%; opacity: 0; border: none; background: none; padding: 0; }
.half-hit.left { left: 0; }
.half-hit.right { right: 0; }
.star-num { margin-left: 8px; font-size: 13px; color: var(--text-muted); min-width: 26px; }

/* ---- empty state ---- */
.empty-house { text-align: left; max-width: 480px; padding: 90px 0; }
.empty-mark { color: var(--accent); font-size: 12px; font-weight: 800; letter-spacing: .14em; margin-bottom: 14px; }
.empty-house h2 { font-family: var(--body); font-weight: 800; letter-spacing: -.01em; }
.empty-house p { color: var(--text-muted); margin-bottom: 22px; }

/* ---- modal ---- */
.overlay {
  position: fixed; inset: 0; background: rgba(8,9,12,.78); z-index: 50;
  display: flex; align-items: flex-start; justify-content: center;
  padding: 6vh 16px 16px; overflow-y: auto;
}
.modal {
  background: var(--surface); border: 1px solid var(--line); border-radius: 0;
  width: 100%; max-width: 640px; padding: 20px 22px 24px;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
}
.modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.modal-head h2 { font-family: var(--body); font-weight: 800; font-size: 17px; margin: 0; color: var(--text); }
.search-big { width: 100%; font-size: 16px; padding: 12px 14px; margin-bottom: 12px; }
.results { list-style: none; margin: 0; padding: 0; max-height: 46vh; overflow-y: auto; }
.result {
  display: flex; align-items: center; gap: 12px; width: 100%;
  background: none; border: none; border-bottom: 1px solid var(--line);
  padding: 8px 6px; text-align: left; color: var(--text);
}
.result:hover { background: var(--surface-raised); }
.result img, .thumb-blank { width: 38px; height: 57px; object-fit: cover; border-radius: 0; background: var(--surface-raised); flex-shrink: 0; }
.result-title { font-size: 14.5px; font-weight: 500; }
.result-year { color: var(--text-muted); font-size: 12.5px; }
.result-flag { margin-left: auto; font-size: 11px; font-weight: 600; color: var(--accent); letter-spacing: .04em; text-transform: uppercase; }

.notice {
  background: var(--surface-raised); border: 1px solid var(--line);
  border-radius: 0; padding: 10px 12px; font-size: 13.5px; margin: 10px 0;
}
.notice.error { border-color: var(--danger); }
.notice.good { border-color: var(--accent); color: var(--accent); }

/* ---- log form ---- */
.log-form { display: flex; gap: 20px; flex-wrap: wrap; }
.log-form-poster { width: 160px; flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; }
.log-form-poster img { width: 100%; border-radius: 0; }
.poster-change-btn { width: 100%; }
.log-form-fields { flex: 1; min-width: 240px; display: flex; flex-direction: column; gap: 14px; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field > span { font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); }
.row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.row-end { display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; }
.row-btns { display: flex; gap: 6px; }

/* ---- detail ---- */
.back { margin-bottom: 16px; }
.detail-main { display: flex; gap: 34px; flex-wrap: wrap; }
.detail-poster { width: 280px; flex-shrink: 0; }
.detail-poster img { width: 100%; border-radius: 0; }
.detail-info { flex: 1; min-width: 280px; display: flex; flex-direction: column; gap: 18px; }
.detail-facts { display: flex; gap: 16px; color: var(--text-muted); font-size: 13px; flex-wrap: wrap; }
.film-facts { display: flex; flex-direction: column; gap: 10px; margin: 2px 0 4px; }
.film-plot { color: var(--text); font-size: 14px; line-height: 1.55; max-width: 62ch; margin: 0; }
.film-credit { font-size: 13.5px; color: var(--text); margin: 0; }
.film-credit-label {
  font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
  color: var(--text-muted); margin-right: 6px;
}
.film-cast { display: flex; flex-direction: column; gap: 6px; }
.film-cast-list { display: flex; flex-wrap: wrap; gap: 6px; }
.cast-chip {
  background: var(--surface); border: 1px solid var(--line); border-radius: 0;
  padding: 4px 11px; font-size: 12px; color: var(--text);
}
.review-text { white-space: pre-wrap; margin: 0 0 8px; max-width: 60ch; }
.danger-zone { margin-top: 8px; padding-top: 14px; border-top: 1px solid var(--line); }

.poster-picker { margin-top: 30px; }
.poster-grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
.poster-option {
  background: none; border: 2px solid transparent; border-radius: 0;
  padding: 0; position: relative; overflow: hidden;
}
.poster-option img { width: 100%; border-radius: 0; }
.poster-option:hover { border-color: var(--accent-muted); }
.poster-option.active { border-color: var(--accent); }
.poster-lang {
  position: absolute; bottom: 4px; right: 4px;
  background: rgba(18,19,23,.85); color: var(--text);
  font-size: 10px; font-weight: 600; letter-spacing: .04em; padding: 2px 6px; border-radius: 0;
}
.poster-option.active .poster-lang { color: var(--accent); }

/* ---- lists ---- */
.list-create { margin-bottom: 26px; }
.list-create input { flex: 1; min-width: 220px; }
.list-cards { display: flex; flex-direction: column; gap: 12px; }
.list-card {
  display: flex; align-items: center; gap: 12px;
  background: transparent; border: none; border-bottom: 1px solid var(--line); border-radius: 0;
  padding: 12px 2px 16px;
}
.list-card-open { display: flex; align-items: center; gap: 16px; flex: 1; background: none; border: none; color: var(--text); text-align: left; padding: 0; }
.list-covers { display: flex; }
.list-covers img, .list-covers .thumb-blank { width: 34px; height: 51px; border-radius: 0; margin-right: -10px; border: 1px solid var(--bg); }
.list-name { font-family: var(--body); font-weight: 700; font-size: 16px; }
.list-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.list-head-actions { display: flex; gap: 8px; flex-shrink: 0; }
.list-rows { list-style: none; margin: 14px 0 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
.list-row {
  display: flex; align-items: center; gap: 12px;
  background: transparent; border: none; border-bottom: 1px solid var(--line); border-radius: 0; padding: 8px 2px 12px;
}
.list-row-num { font-family: var(--body); font-weight: 700; color: var(--accent); width: 22px; text-align: right; }
.list-row-main { display: flex; align-items: center; gap: 12px; flex: 1; background: none; border: none; color: var(--text); text-align: left; padding: 0; }
.list-row-main:disabled { cursor: default; opacity: .7; }
.list-row-main img { width: 34px; height: 51px; object-fit: cover; border-radius: 0; }

/* ---- top 5 ---- */
.marquee-board {
  list-style: none; margin: 0; padding: 0;
  display: grid; gap: 20px;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
}
.marquee-slot { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
.marquee-rank {
  color: var(--accent); font-size: 11px; font-weight: 800; letter-spacing: .12em;
  border-top: 2px solid var(--accent); padding-top: 6px;
}
.marquee-poster { background: none; border: none; border-radius: 0; padding: 0; width: 100%; overflow: visible; }
.marquee-poster img {
  width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 0;
  outline: 1px solid rgba(255,255,255,.07); outline-offset: -1px;
  transition: transform .16s ease, outline-color .16s ease;
}
.marquee-poster:hover img, .marquee-poster:focus-visible img { transform: translateY(-3px); outline-color: var(--accent); }
.marquee-title {
  font-family: var(--body); font-weight: 600; font-size: 13px; text-align: left;
  line-height: 1.3; min-height: 2.6em;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.marquee-empty {
  width: 100%; aspect-ratio: 2/3;
  background: transparent; color: var(--text-muted);
  border: 1px solid var(--line); border-radius: 0;
  font-family: var(--body); font-weight: 600; font-size: 12px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
}
.marquee-empty svg { width: 20px; height: 20px; }
.marquee-empty:hover { color: var(--accent); border-color: var(--accent-muted); }
.rank-controls { display: grid; grid-template-columns: 32px 32px 1fr 32px; gap: 5px; }
.rank-controls .btn-ghost { padding: 6px 8px; font-size: 11px; }

/* ---- stats ---- */
.stat-cards { display: grid; gap: 14px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
.stat-card {
  background: transparent; border: none; border-top: 2px solid var(--line); border-radius: 0;
  padding: 16px 0 18px; text-align: left;
}
.stat-card:first-child { border-top-color: var(--accent); }
.stat-num { font-family: var(--body); font-weight: 800; font-size: 34px; color: var(--text); line-height: 1.1; letter-spacing: -.04em; }
.stat-num.small { font-size: 20px; padding-top: 8px; }
.stat-label { color: var(--text-muted); font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; margin-top: 6px; }
.bar-chart { display: flex; align-items: flex-end; gap: 8px; padding: 10px 4px 0; overflow-x: auto; }
.bar-col { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 34px; flex: 1; }
.bar { width: 100%; max-width: 40px; background: var(--accent); border-radius: 0; min-height: 2px; }
.bar-val { font-size: 11px; color: var(--text-muted); height: 14px; }
.bar-label { font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text-muted); }
.rating-histogram {
  display: flex; align-items: flex-end; gap: 6px;
  width: 100%; max-width: 680px; padding-top: 8px;
}
.rating-column { display: flex; flex: 1; min-width: 24px; flex-direction: column; align-items: center; gap: 5px; }
.rating-count { color: var(--text-muted); font-size: 10px; height: 15px; }
.rating-track {
  width: 100%; height: 120px; display: flex; align-items: flex-end;
  background: var(--surface); border-bottom: 1px solid var(--line);
}
.rating-bar { width: 100%; background: var(--accent-muted); }
.rating-column:hover .rating-bar { background: var(--accent); }
.rating-label { color: var(--text-muted); font-size: 10px; font-weight: 600; }

/* ---- settings ---- */
.settings { max-width: 560px; }
.settings input { width: 100%; }

/* ---- toast ---- */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--surface-raised); color: var(--text);
  border: 1px solid var(--accent); border-radius: 0;
  padding: 10px 18px; font-size: 14px; z-index: 60;
  box-shadow: 0 8px 30px rgba(0,0,0,.45);
}

/* ---- responsive ---- */
@media (max-width: 640px) {
  .topbar-inner { justify-content: center; padding: calc(11px + env(safe-area-inset-top)) 14px 11px; }
  .brand { font-size: 18px; }
  .desktop-nav { display: none; }
  .bottombar { display: flex; }
  .stage { padding: 16px 14px calc(84px + env(safe-area-inset-bottom)); }
  .films-head { align-items: flex-end; gap: 16px; }
  .films-head .page-head { font-size: 26px; }
  .top-tabs { gap: 16px; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
  .detail-poster { width: 100%; max-width: 300px; }
  .log-form-poster { width: 110px; }
  .marquee-board { grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); }
  .rank-controls { grid-template-columns: 1fr 1fr; }
  .rank-controls .btn-ghost { grid-column: 1 / -1; order: -1; }
}
